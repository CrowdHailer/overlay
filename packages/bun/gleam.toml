name = "overlay_bun"
version = "1.0.0"
target = "javascript"

description = "An open LLM workspace assistant."
licences = ["Apache-2.0"]
repository = { type = "github", user = "crowdhailer", repo = "" }
links = []

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
argv = ">= 1.0.2 and < 2.0.0"
envoy = ">= 1.1.0 and < 2.0.0"
eyg_interpreter = ">= 1.1.0 and < 2.0.0"
eyg_parser = ">= 0.2.0 and < 1.0.0"
filepath = ">= 1.1.2 and < 2.0.0"
gleam_community_ansi = ">= 1.4.4 and < 2.0.0"
gleam_crypto = ">= 1.5.1 and < 2.0.0"
gleam_fetch = { git = "https://github.com/CrowdHailer/fetch.git", ref = "stream-response" }
gleam_http = ">= 4.3.0 and < 5.0.0"
# gleam_javascript = ">= 1.0.0 and < 2.0.0"
gleam_javascript = { git = "https://github.com/CrowdHailer/javascript.git", ref = "try_sync" }
gleam_json = ">= 3.1.0 and < 4.0.0"
input = ">= 1.0.1 and < 2.0.0"
multiformats = ">= 4.0.0 and < 5.0.0"
overlay = { path = "../overlay" }
overlay_llm = { path = "../llm" }
simplifile = ">= 2.4.0 and < 3.0.0"
touch_grass = ">= 0.1.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
eyg_ir = ">= 1.0.0 and < 2.0.0"

[javascript]
runtime = "bun"
